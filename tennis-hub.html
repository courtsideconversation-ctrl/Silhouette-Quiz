<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tennis Quizzes · CourtsideConversation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #1e1e1e;
    --surface:    #2a2a2a;
    --accent:     #a8c53a;
    --accent-dim: #6b8e3e;
    --text:       #f0f0f0;
    --muted:      #888;
    --border:     #3a3a3a;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body:    'Inter', system-ui, sans-serif;
    --radius:     12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg); color: var(--text);
    font-family: var(--font-body); height: 100%;
    display: flex; flex-direction: column;
  }

  header {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }

  .back-btn {
    display: none; align-items: center; gap: 6px;
    background: transparent; border: 1px solid var(--border); border-radius: 8px;
    padding: 6px 12px; color: var(--muted); font-family: var(--font-body);
    font-size: 13px; cursor: pointer; transition: border-color 0.15s, color 0.15s;
  }
  .back-btn:hover { border-color: var(--text); color: var(--text); }
  .back-btn.show { display: flex; }

  .content { flex: 1; position: relative; overflow: hidden; }

  #landing {
    position: absolute; inset: 0; overflow-y: auto;
    display: flex; flex-direction: column; align-items: center;
    padding: 48px 24px 64px; gap: 40px;
  }
  .hero { text-align: center; max-width: 480px; }
  .hero-title {
    font-family: var(--font-display); font-size: 42px; font-weight: 900;
    line-height: 1.1; margin-bottom: 14px;
  }
  .hero-title em { font-style: normal; color: var(--accent); }
  .hero-desc { color: var(--muted); font-size: 15px; line-height: 1.7; }

  .games-grid { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; width: 100%; max-width: 560px; }
  .game-card {
    flex: 1; min-width: 220px; max-width: 260px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 24px 20px;
    display: flex; flex-direction: column; gap: 12px;
    cursor: pointer; transition: border-color 0.15s, transform 0.1s;
  }
  .game-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .game-name { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--text); }
  .game-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
  .game-btn {
    margin-top: auto; padding: 12px; border: none; border-radius: 8px;
    background: var(--accent); color: #1a1a1a;
    font-family: var(--font-body); font-size: 14px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
  }
  .game-btn:hover { background: var(--accent-dim); }

  #game-frame { position: absolute; inset: 0; display: none; }
  #game-frame.show { display: block; }
  #game-frame iframe { width: 100%; height: 100%; border: none; }

  @media (max-width: 480px) {
    .hero-title { font-size: 32px; }
    .games-grid { flex-direction: column; align-items: center; }
    .game-card { max-width: 100%; }
  }
</style>
</head>
<body>

<header>
  <a href="https://courtsideconversation.com">
    <img src="https://courtsideconversation-ctrl.github.io/ATP-Quiz/logo.png" alt="CourtsideConversation" style="height:38px;">
  </a>
  <button class="back-btn" id="back-btn" onclick="goHome()">← Back to games</button>
</header>

<div class="content">

  <div id="landing">
    <div class="hero">
      <h1 class="hero-title">Tennis<br><em>Quizzes</em></h1>
      <p class="hero-desc">Test your tennis knowledge. How well do you know the ATP Top 100?</p>
    </div>

    <div class="games-grid">
      <div class="game-card" onclick="launchGame('atp')">
        <div class="game-name">ATP Photo Quiz</div>
        <div class="game-desc">Name as many ATP Top 100 players as you can from their headshots. Updated every Monday.</div>
        <button class="game-btn">Play now</button>
      </div>
      <div class="game-card" onclick="launchGame('silhouette')">
        <div class="game-name">Silhouette Game</div>
        <div class="game-desc">Can you name ATP players from their silhouette alone?</div>
        <button class="game-btn">Play now</button>
      </div>
    </div>
  </div>

  <div id="game-frame">
    <iframe id="iframe" src="" allow="autoplay"></iframe>
  </div>

</div>

<script>
  const URLS = {
    atp:        'https://courtsideconversation-ctrl.github.io/ATP-Quiz/',
    silhouette: 'https://courtsideconversation-ctrl.github.io/Silhouette-Quiz/'
  };

  function launchGame(game) {
    document.getElementById('iframe').src = URLS[game];
    document.getElementById('landing').style.display = 'none';
    document.getElementById('game-frame').classList.add('show');
    document.getElementById('back-btn').classList.add('show');
  }

  function goHome() {
    document.getElementById('iframe').src = '';
    document.getElementById('game-frame').classList.remove('show');
    document.getElementById('landing').style.display = 'flex';
    document.getElementById('back-btn').classList.remove('show');
  }
</script>
</body>
</html>
