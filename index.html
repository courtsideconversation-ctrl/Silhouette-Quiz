<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess the Silhouette · CourtsideConversation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #1e1e1e;
    --surface:    #2a2a2a;
    --surface2:   #333333;
    --accent:     #a8c53a;
    --accent-dim: #6b8e3e;
    --text:       #f0f0f0;
    --muted:      #888;
    --border:     #3a3a3a;
    --correct:    #4caf6e;
    --wrong:      #e25c5c;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body:    'Inter', system-ui, sans-serif;
    --radius:     12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--font-body);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  }
  main { width: 100%; max-width: 560px; padding: 24px 16px 64px; display: flex; flex-direction: column; gap: 16px; }

  .page-title { font-family: var(--font-display); font-size: 28px; font-weight: 900; text-align: center; line-height: 1.1; }
  .page-title em { font-style: normal; color: var(--accent); }
  .page-date { text-align: center; font-size: 13px; color: var(--muted); }

  /* ── Mode toggle ── */
  .mode-toggle {
    display: flex; background: var(--surface); border: 1px solid var(--border);
    border-radius: 100px; padding: 4px; gap: 4px;
  }
  .mode-btn {
    flex: 1; padding: 10px 16px; border: none; border-radius: 100px;
    background: transparent; color: var(--muted); font-family: var(--font-body);
    font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s, color 0.15s;
  }
  .mode-btn.active { background: var(--accent); color: #1a1a1a; }

  /* ── Silhouette card ── */
  .silo-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; position: relative;
  }
  .silo-wrap { width: 100%; aspect-ratio: 4/3; background: #1a1a1a; display: flex; align-items: center; justify-content: center; }
  .silo-wrap video { width: 100%; height: 100%; object-fit: contain; }

  .guesses-left {
    position: absolute; top: 10px; right: 12px;
    background: rgba(0,0,0,0.7); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px; font-size: 12px; color: var(--muted);
    backdrop-filter: blur(4px);
  }
  .guesses-left strong { color: var(--text); }

  /* ── View badge (front/back) ── */
  .view-badge {
    position: absolute; top: 10px; left: 12px;
    background: rgba(0,0,0,0.7); border: 1px solid var(--accent);
    border-radius: 6px; padding: 4px 10px; font-size: 12px; color: var(--accent);
    backdrop-filter: blur(4px); font-weight: 600; display: none;
  }
  .view-badge.show { display: block; }

  /* ── Active players note ── */
  .active-note {
    text-align: center; font-size: 12px; color: var(--muted);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 8px 14px;
  }

  /* ── Guess rows ── */
  .guess-list { display: flex; flex-direction: column; gap: 8px; }
  .guess-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; min-height: 48px;
  }
  .guess-row .guess-num { font-size: 12px; color: var(--muted); min-width: 16px; }
  .guess-row .guess-name { font-size: 14px; font-weight: 500; flex: 1; }
  .guess-row .guess-result { font-size: 18px; }
  .guess-row.correct { border-color: var(--correct); background: rgba(76,175,110,0.1); }
  .guess-row.hint    { border-color: #e0a030; background: rgba(224,160,48,0.1); color: #e0a030; }
  .guess-row.wrong   { border-color: var(--wrong);   background: rgba(226,92,92,0.08); }
  .guess-row.empty   { border-style: dashed; opacity: 0.4; }

  /* ── Input ── */
  .input-wrap { position: relative; display: flex; gap: 8px; }
  .input-inner { position: relative; flex: 1; }
  #guess-input {
    width: 100%; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-family: var(--font-body);
    font-size: 16px; outline: none; transition: border-color 0.15s;
  }
  #guess-input:focus { border-color: var(--accent); }
  #guess-input:disabled { opacity: 0.4; }

  .dropdown {
    position: absolute; bottom: calc(100% + 4px); left: 0; right: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; z-index: 100; display: none;
    box-shadow: 0 -8px 24px rgba(0,0,0,0.4);
  }
  .dropdown.open { display: block; }
  .dropdown-item {
    padding: 12px 16px; cursor: pointer; font-size: 14px; font-weight: 500;
    border-bottom: 1px solid var(--border); transition: background 0.1s;
    display: flex; align-items: center; justify-content: space-between;
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover, .dropdown-item.highlighted { background: var(--surface2); }
  .dropdown-item .item-meta { font-size: 12px; color: var(--muted); }

  /* ── Result modal ── */
  .modal-overlay {
    position: absolute; top: 0; left: 0; width: 100%; min-height: 100%;
    background: rgba(0,0,0,0.75); display: none; align-items: flex-start;
    justify-content: center; z-index: 300; padding: 24px; backdrop-filter: blur(4px);
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 28px 24px; width: 100%; max-width: 400px; display: flex; flex-direction: column;
    gap: 14px; position: relative; margin-top: 10vh; animation: popIn 0.2s ease;
  }
  @keyframes popIn { from { transform: scale(0.93); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-close {
    position: absolute; top: 14px; right: 14px; background: transparent;
    border: 1px solid var(--border); border-radius: 6px; width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center; color: var(--muted);
    cursor: pointer; font-size: 16px; transition: border-color 0.15s, color 0.15s;
  }
  .modal-close:hover { border-color: var(--text); color: var(--text); }
  .result-label  { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; text-align: center; }
  .result-name   { font-family: var(--font-display); font-size: 28px; font-weight: 900; color: var(--accent); text-align: center; }
  .result-rank   { font-size: 13px; color: var(--muted); text-align: center; }
  .result-squares { font-size: 22px; text-align: center; letter-spacing: 3px; }
  .btn-share {
    padding: 14px; border: none; border-radius: var(--radius); background: var(--accent);
    color: #1a1a1a; font-family: var(--font-body); font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-share:hover { background: var(--accent-dim); }
  .next-puzzle { text-align: center; font-size: 13px; color: var(--muted); }
  .next-puzzle strong { color: var(--text); }

  .btn-see-results {
    display: none; padding: 14px; border: none; border-radius: var(--radius);
    background: var(--accent); color: #1a1a1a; font-family: var(--font-body);
    font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s;
  }
  .btn-see-results.show { display: block; }
  .btn-see-results:hover { background: var(--accent-dim); }


  .hint-overlay {
    display: none; align-items: center; justify-content: center; gap: 10px;
    padding: 10px 14px; background: var(--surface); border: 1px solid #e0a030;
    border-radius: var(--radius); font-size: 14px; font-weight: 600; color: var(--text);
  }
  .hint-overlay.show { display: flex; }
  .hint-overlay .hint-label { font-size: 12px; color: var(--muted); }
  .flag-dot { width: 18px; height: 18px; border-radius: 50%; display: inline-block; border: 1px solid rgba(255,255,255,0.2); }
  .hint-btn {
    width: 100%; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); font-size: 14px; font-weight: 500;
    color: var(--muted); cursor: pointer; font-family: var(--font-body);
    transition: border-color 0.15s, color 0.15s; text-align: center;
  }
  .hint-btn:hover { border-color: var(--accent); color: var(--accent); }
  .hint-btn.used { display: none; }
</style>
</head>
<body>
<main>
  <div>
    <h1 class="page-title">Guess the <em>Silhouette</em></h1>
    <p class="page-date" id="page-date"></p>
  </div>

  <!-- Mode toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-mode-shot" onclick="switchMode('shot')">Shot of the Day</button>
    <button class="mode-btn" id="btn-mode-celebration" onclick="switchMode('celebration')">Celebration of the Day</button>
  </div>

  <p class="active-note">Active ATP players only</p>

  <div id="loading" class="loading-msg">Loading today's puzzle…</div>
  <div id="error" class="error-msg" style="display:none"></div>

  <!-- Silhouette card -->
  <div class="silo-card" id="silo-card" style="display:none">
    <div class="silo-wrap">
      <video id="silo-video" autoplay loop muted playsinline></video>
    </div>
    <div class="view-badge" id="view-badge"></div>
    <div class="guesses-left" id="guesses-left"></div>
  </div>

  <!-- Hint controls (below card) -->
  <button class="hint-btn" id="hint-btn" onclick="useHint()">Hint (costs 1 guess)</button>
  <div class="hint-overlay" id="hint-overlay"></div>

  <!-- Input -->
  <div class="input-wrap" id="input-area" style="display:none">
    <div class="input-inner">
      <div class="dropdown" id="dropdown"></div>
      <input type="text" id="guess-input" placeholder="Type a player name…" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
  </div>

  <!-- Guess rows -->
  <div class="guess-list" id="guess-list"></div>
  <button class="btn-see-results" id="btn-see-results" onclick="showModalNow()">See results</button>

  <!-- Result modal -->
  <div class="modal-overlay" id="result-modal">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="result-label" id="result-label">The player was</div>
      <div class="result-name"  id="result-name"></div>
      <div class="result-rank"  id="result-rank"></div>
      <div class="result-squares" id="result-squares"></div>
      <button class="btn-share" id="btn-share">Share result</button>
      <div class="next-puzzle"  id="next-puzzle"></div>
    </div>
  </div>
</main>

<script>
const MAX_GUESSES = 6;
const STORAGE_KEY_SHOT = 'silhouette_shot';
const STORAGE_KEY_CELEB = 'silhouette_celebration';

let allPlayers  = [];
let shotOrder   = [];   // [{id, view}] — view is 'front'|'back'|null
let celebOrder  = [];   // [{id}]
let todayPlayer = null;
let todayView   = null; // 'front' | 'back' | null
let todayClip   = 1;    // clip number
let guesses     = [];
let gameOver    = false;
let hintsUsed   = 0; // 0=none, 1=background, 2=continent, 3=flag
let highlightedIndex = -1;
let currentMode = 'shot'; // 'shot' | 'celebration'

// ── Helpers ───────────────────────────────────────────────────────────────────

function getTodayStr() { return new Date().toISOString().split('T')[0]; }

function getDayIndex() {
  const epoch = new Date('2026-06-23T00:00:00Z');
  const now = new Date();
  now.setUTCHours(0,0,0,0);
  return Math.floor((now - epoch) / 86400000);
}

function getTimeUntilMidnight() {
  const now = new Date();
  const midnight = new Date();
  midnight.setHours(24,0,0,0);
  const diff = midnight - now;
  const h = Math.floor(diff/3600000);
  const m = Math.floor((diff%3600000)/60000);
  const s = Math.floor((diff%60000)/1000);
  return `${h}h ${m}m ${s}s`;
}

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  document.getElementById('page-date').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  try {
    const [pr, sr, cr] = await Promise.all([
      fetch('data/players.json'),
      fetch('data/shot_order.json'),
      fetch('data/celebration_order.json')
    ]);
    if (!pr.ok) throw new Error('players.json missing');

    allPlayers = await pr.json();
    if (sr.ok) shotOrder  = await sr.json();
    if (cr.ok) celebOrder = await cr.json();

    document.getElementById('loading').style.display = 'none';
    loadMode('shot');
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'Could not load today\'s puzzle. ' + e.message;
  }
}

// ── Mode switching ────────────────────────────────────────────────────────────

function switchMode(mode) {
  if (mode === currentMode) return;
  currentMode = mode;
  document.getElementById('btn-mode-shot').classList.toggle('active', mode === 'shot');
  document.getElementById('btn-mode-celebration').classList.toggle('active', mode === 'celebration');
  closeModal();
  loadMode(mode);
}

function loadMode(mode) {
  currentMode = mode;
  const order = mode === 'shot' ? shotOrder : celebOrder;
  const storageKey = mode === 'shot' ? STORAGE_KEY_SHOT : STORAGE_KEY_CELEB;

  if (order.length === 0) {
    document.getElementById('silo-card').style.display = 'none';
    document.getElementById('hint-btn').style.display = 'none';
    document.getElementById('hint-overlay').classList.remove('show');
    document.getElementById('input-area').style.display = 'none';
    document.getElementById('guess-list').innerHTML = '';
    document.getElementById('btn-see-results').classList.remove('show');
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = mode === 'shot'
      ? 'No shot clips available yet — check back soon!'
      : 'No celebration clips available yet — check back soon!';
    return;
  }

  document.getElementById('error').style.display = 'none';

  const dayIdx  = getDayIndex();
  const entry   = order[dayIdx % order.length];
  const todayId = typeof entry === 'object' ? entry.id : entry;
  todayView     = (typeof entry === 'object' && entry.view) ? entry.view : null;
  todayClip     = (typeof entry === 'object' && entry.clip) ? entry.clip : 1;
  todayPlayer   = allPlayers.find(p => Number(p.id) === Number(todayId));
  guesses       = [];
  gameOver      = false;
  hintsUsed     = 0;
  highlightedIndex = -1;

  if (!todayPlayer) {
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = "Could not find today's player.";
    return;
  }

  checkSavedState(storageKey);
}

// ── State persistence ─────────────────────────────────────────────────────────

function loadState(key) {
  try { const r = localStorage.getItem(key); return r ? JSON.parse(r) : null; }
  catch { return null; }
}

function saveState() {
  const key = currentMode === 'shot' ? STORAGE_KEY_SHOT : STORAGE_KEY_CELEB;
  localStorage.setItem(key, JSON.stringify({
    date: getTodayStr(), playerId: todayPlayer.id, clip: todayClip, guesses, gameOver, hintsUsed
  }));
}

function checkSavedState(key) {
  const saved = loadState(key);
  if (saved && saved.date === getTodayStr() && saved.playerId === todayPlayer.id && (saved.clip || 1) === todayClip) {
    guesses  = saved.guesses;
    gameOver = saved.gameOver;
    hintsUsed = saved.hintsUsed || 0;
  }
  renderGame();
  if (gameOver) showResult(false);
}

// ── Render ────────────────────────────────────────────────────────────────────

function renderGame() {
  document.getElementById('silo-card').style.display = '';
  const vid = document.getElementById('silo-video');

  const folder = currentMode === 'shot' ? 'silhouettes' : 'celebrations';
  const hintFolder = currentMode === 'shot' ? 'hints-shot' : 'hints-celeb';
  if (!gameOver) {
    if (hintsUsed >= 1) {
      vid.src = `${hintFolder}/${todayPlayer.id}_${todayClip}.mp4`;
    } else {
      vid.src = `${folder}/${todayPlayer.id}_${todayClip}.mp4`;
    }
  } else {
    vid.src = `reveals-${currentMode === 'celebration' ? 'celeb' : 'shot'}/${todayPlayer.id}_${todayClip}.mp4`;
  }
  vid.load(); vid.play();

  // Hint button
  const hintBtn = document.getElementById('hint-btn');
  hintBtn.style.display = '';
  const hintLabels = ['Hint 1: Background (costs 1 guess)', 'Hint 2: Continent (costs 1 guess)', 'Hint 3: Flag colors (costs 1 guess)'];
  if (gameOver || hintsUsed >= 3) {
    hintBtn.classList.add('used');
  } else {
    hintBtn.classList.remove('used');
    hintBtn.textContent = hintLabels[hintsUsed] || 'Hint (costs 1 guess)';
  }
  // Restore hint overlays if hints were already used
  if (hintsUsed >= 3 && !gameOver) showFlagHint();
  else if (hintsUsed >= 2 && !gameOver) showContinentHint();
  else document.getElementById('hint-overlay').classList.remove('show');

  // View badge (front/back) — only for shots, only before game over
  const vb = document.getElementById('view-badge');
  if (currentMode === 'shot' && todayView && !gameOver) {
    vb.textContent = todayView === 'front' ? 'Front view' : 'Back view';
    vb.classList.add('show');
  } else {
    vb.classList.remove('show');
  }

  // Guesses remaining
  const remaining = MAX_GUESSES - guesses.length;
  const gl = document.getElementById('guesses-left');
  gl.innerHTML = `<strong>${remaining}</strong> guess${remaining===1?'':'es'} left`;
  gl.style.display = gameOver ? 'none' : '';

  // Guess rows
  const list = document.getElementById('guess-list');
  list.innerHTML = '';
  for (let i = 0; i < MAX_GUESSES; i++) {
    const row = document.createElement('div');
    if (i < guesses.length) {
      const g = guesses[i];
      row.className = `guess-row ${g.correct ? 'correct' : g.isHint ? 'hint' : 'wrong'}`;
      row.innerHTML = `
        <span class="guess-num">${i+1}</span>
        <span class="guess-name">${g.name}</span>
        <span class="guess-result">${g.correct ? '✓' : '✗'}</span>`;
    } else {
      row.className = 'guess-row empty';
      row.innerHTML = `<span class="guess-num">${i+1}</span><span class="guess-name" style="color:var(--border)">—</span>`;
    }
    list.appendChild(row);
  }

  // Input
  const inp = document.getElementById('guess-input');
  if (!gameOver) {
    document.getElementById('input-area').style.display = 'flex';
    document.getElementById('btn-see-results').classList.remove('show');
    inp.disabled = false;
    inp.value = '';
  } else {
    document.getElementById('input-area').style.display = 'none';
    document.getElementById('btn-see-results').classList.add('show');
  }
}

// ── Continent map ─────────────────────────────────────────────────────────────
const COUNTRY_CONTINENT = {
  ITA: 'Europe', ESP: 'Europe', GER: 'Europe', SRB: 'Europe', RUS: 'Europe',
  NOR: 'Europe', GRE: 'Europe', GBR: 'Europe', FRA: 'Europe', SUI: 'Europe',
  AUT: 'Europe', CRO: 'Europe', POL: 'Europe', BEL: 'Europe', NED: 'Europe',
  CZE: 'Europe', DEN: 'Europe', FIN: 'Europe', SWE: 'Europe', POR: 'Europe',
  HUN: 'Europe', BUL: 'Europe', ROM: 'Europe', SVK: 'Europe', UKR: 'Europe',
  AUS: 'Oceania',
  USA: 'North America', CAN: 'North America',
  ARG: 'South America', BRA: 'South America', CHI: 'South America',
  JPN: 'Asia', KAZ: 'Asia', KOR: 'Asia', TPE: 'Asia',
  RSA: 'Africa',
};

// ── Flag color map ────────────────────────────────────────────────────────────
const FLAG_COLORS = {
  ITA: ['#009246','#fff','#CE2B37'],
  ESP: ['#AA151B','#F1BF00','#AA151B'],
  GER: ['#000','#D00','#FFCE00'],
  SRB: ['#C6363C','#0C4076','#FFFFFF'],
  RUS: ['#fff','#1C3578','#E4181C'],
  NOR: ['#EF2B2D','#fff','#002868'],
  GRE: ['#0D5EAF','#fff','#0D5EAF'],
  GBR: ['#012169','#fff','#C8102E'],
  FRA: ['#002395','#fff','#ED2939'],
  SUI: ['#FF0000','#fff','#FF0000'],
  AUT: ['#ED2939','#fff','#ED2939'],
  CRO: ['#FF0000','#fff','#171796'],
  POL: ['#fff','#DC143C','#fff'],
  BEL: ['#000','#FFD90C','#F31830'],
  NED: ['#AE1C28','#fff','#21468B'],
  CZE: ['#D7141A','#fff','#11457E'],
  AUS: ['#00008B','#fff','#FF0000'],
  USA: ['#B22234','#fff','#3C3B6E'],
  CAN: ['#FF0000','#fff','#FF0000'],
  ARG: ['#74ACDF','#fff','#74ACDF'],
  BRA: ['#009C3B','#FFDF00','#002776'],
  JPN: ['#fff','#BC002D','#fff'],
  KAZ: ['#00AFCA','#FFDD00','#00AFCA'],
  DEN: ['#C60C30','#fff','#C60C30'],
  FIN: ['#fff','#003580','#fff'],
  SWE: ['#006AA7','#FECC02','#006AA7'],
  CHI: ['#D52B1E','#fff','#0039A6'],
  POR: ['#006600','#FF0000','#006600'],
  HUN: ['#CE2939','#fff','#477050'],
  BUL: ['#fff','#00966E','#D62612'],
  RSA: ['#007A4D','#FFB81C','#001489'],
  KOR: ['#fff','#CD2E3A','#0047A0'],
  TPE: ['#FE0000','#fff','#003F87'],
  UKR: ['#005BBB','#FFD500','#005BBB'],
  ROM: ['#002B7F','#FCD116','#CE1126'],
  SVK: ['#fff','#0B4EA2','#EE1C25'],
};

function showContinentHint() {
  const overlay = document.getElementById('hint-overlay');
  overlay.classList.add('show');
  const continent = COUNTRY_CONTINENT[todayPlayer.country] || 'Unknown';
  overlay.innerHTML = `<span class="hint-label">Continent:</span><span>${continent}</span>`;
}

function showFlagHint() {
  const overlay = document.getElementById('hint-overlay');
  overlay.classList.add('show');
  const colors = FLAG_COLORS[todayPlayer.country] || ['#888','#888','#888'];
  const dots = colors.map(c => `<span class="flag-dot" style="background:${c}"></span>`).join('');
  const continent = COUNTRY_CONTINENT[todayPlayer.country] || '';
  overlay.innerHTML = `<span class="hint-label">Continent: ${continent} &nbsp;|&nbsp; Flag colors:</span>${dots}`;
}

function useHint() {
  if (hintsUsed >= 3 || gameOver) return;
  hintsUsed++;

  // Each hint costs one guess — add a yellow hint row
  guesses.push({ name: `Hint ${hintsUsed}`, correct: false, isHint: true });
  saveState();
  renderGame();

  if (hintsUsed === 1) {
    // Background hint — swap video
    const hintFolder = currentMode === 'shot' ? 'hints-shot' : 'hints-celeb';
    const vid = document.getElementById('silo-video');
    vid.src = `${hintFolder}/${todayPlayer.id}_${todayClip}.mp4`;
    vid.load(); vid.play();
  } else if (hintsUsed === 2) {
    showContinentHint();
  } else if (hintsUsed === 3) {
    showFlagHint();
  }

  // Check if out of guesses after hint
  if (guesses.length >= MAX_GUESSES) {
    gameOver = true;
    saveState();
    renderGame();
    setTimeout(openModal, 500);
    document.getElementById('btn-see-results').classList.add('show');
  }
}

// ── Guess logic ───────────────────────────────────────────────────────────────

function norm(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z\s]/g,'').trim();
}

function submitGuess(player) {
  if (gameOver) return;
  const correct = player.id === todayPlayer.id;
  guesses.push({ name: player.name, correct });
  if (correct || guesses.length >= MAX_GUESSES) gameOver = true;
  saveState();
  renderGame();
  if (gameOver) setTimeout(() => openModal(), 600);
  document.getElementById('guess-input').value = '';
  closeDropdown();
}

// ── Autocomplete ──────────────────────────────────────────────────────────────

const inp      = document.getElementById('guess-input');
const dropdown = document.getElementById('dropdown');

function getSuggestions(query) {
  if (!query || query.length < 2) return [];
  const q = norm(query);
  return allPlayers.filter(p => {
    const n = norm(p.name);
    return n.startsWith(q) || n.split(' ').some(w => w.startsWith(q));
  }).slice(0, 6);
}

function renderDropdown(suggestions) {
  if (!suggestions.length) { closeDropdown(); return; }
  dropdown.innerHTML = suggestions.map((p,i) => `
    <div class="dropdown-item" data-index="${i}">
      <span>${p.name}</span>
      <span class="item-meta">${p.country || ''} · #${p.rank}</span>
    </div>`).join('');
  dropdown.classList.add('open');
  highlightedIndex = -1;
  dropdown.querySelectorAll('.dropdown-item').forEach(item => {
    item.addEventListener('mousedown', e => {
      e.preventDefault();
      submitGuess(suggestions[parseInt(item.dataset.index)]);
    });
  });
}

function closeDropdown() {
  dropdown.classList.remove('open');
  dropdown.innerHTML = '';
  highlightedIndex = -1;
}

inp.addEventListener('input', () => { if (!gameOver) renderDropdown(getSuggestions(inp.value)); });
inp.addEventListener('keydown', e => {
  if (gameOver) return;
  const items = dropdown.querySelectorAll('.dropdown-item');
  if (e.key === 'ArrowDown') { e.preventDefault(); highlightedIndex = Math.min(highlightedIndex+1, items.length-1); items.forEach((el,i) => el.classList.toggle('highlighted', i===highlightedIndex)); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); highlightedIndex = Math.max(highlightedIndex-1, 0); items.forEach((el,i) => el.classList.toggle('highlighted', i===highlightedIndex)); }
  else if (e.key === 'Enter' && highlightedIndex >= 0) { e.preventDefault(); items[highlightedIndex].dispatchEvent(new Event('mousedown')); }
  else if (e.key === 'Escape') closeDropdown();
});
inp.addEventListener('blur', () => setTimeout(closeDropdown, 150));

// ── Result modal ──────────────────────────────────────────────────────────────

function showResult(animate) {
  const won = guesses.some(g => g.correct);
  document.getElementById('result-label').textContent = won ? 'Correct!' : 'The player was';
  document.getElementById('result-name').textContent  = todayPlayer.name;
  document.getElementById('result-rank').textContent  = `ATP Rank #${todayPlayer.rank} · ${todayPlayer.country}`;
  const squares = guesses.map(g => {
    if (g.correct) return '🟩';
    if (g.isHint) return '🟨';
    return '🟥';
  }).join('');
  document.getElementById('result-squares').textContent = squares;

  function updateCountdown() {
    document.getElementById('next-puzzle').innerHTML = `Next puzzle in <strong>${getTimeUntilMidnight()}</strong>`;
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);

  // Hide hint overlay on game over
  document.getElementById('hint-overlay').classList.remove('show');

  // Swap to reveal
  const vid = document.getElementById('silo-video');
  vid.src = `reveals-${currentMode === 'celebration' ? 'celeb' : 'shot'}/${todayPlayer.id}_${todayClip}.mp4`;
  vid.load(); vid.play();
  document.getElementById('view-badge').classList.remove('show');
  document.getElementById('guesses-left').style.display = 'none';
}

function showModalNow() {
  showResult(true);
  document.getElementById('result-modal').classList.add('show');
  document.body.style.overflow = 'hidden';
  window.scrollTo(0,0);
}

function openModal() {
  showResult(true);
  // Show modal after 0.5s — enough to see the reveal start but not wait the full clip
  setTimeout(() => {
    document.getElementById('result-modal').classList.add('show');
    document.body.style.overflow = 'hidden';
    window.scrollTo(0,0);
  }, 500);
}

function closeModal() {
  document.getElementById('result-modal').classList.remove('show');
  document.body.style.overflow = '';
}

document.getElementById('btn-share').addEventListener('click', () => {
  const won    = guesses.some(g => g.correct);
  const dayIdx = getDayIndex() + 1;
  const score  = won ? guesses.length : 'X';
  const label  = currentMode === 'shot' ? 'Shot' : 'Celebration';
  const squares = guesses.map(g => {
    if (g.correct) return '🟩';
    if (g.isHint) return '🟨';
    return '🟥';
  }).join('');
  const text   = `Silhouette ${label} #${dayIdx} ${score}/${MAX_GUESSES}\n${squares}\ncourtsideconversation-ctrl.github.io/Game-Hub/`;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('btn-share').textContent = 'Copied! ✓';
    setTimeout(() => document.getElementById('btn-share').textContent = 'Share result', 2000);
  });
});

init();
</script>

    }).catch(() => {});

  window.ccTrack = logEvent;
  logEvent('page_load', '');
