<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess the Silhouette · CourtsideConversation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #1e1e1e;
    --surface:    #2a2a2a;
    --surface2:   #333333;
    --accent:     #a8c53a;
    --accent-dim: #6b8e3e;
    --text:       #f0f0f0;
    --muted:      #888;
    --border:     #3a3a3a;
    --correct:    #4caf6e;
    --wrong:      #e25c5c;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body:    'Inter', system-ui, sans-serif;
    --radius:     12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--font-body);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  }
  main {
    width: 100%; max-width: 520px; padding: 24px 16px 64px;
    display: flex; flex-direction: column; gap: 16px;
  }

  .page-title {
    font-family: var(--font-display); font-size: 28px; font-weight: 900;
    text-align: center; line-height: 1.1;
  }
  .page-title em { font-style: normal; color: var(--accent); }
  .page-date { text-align: center; font-size: 13px; color: var(--muted); }

  /* ── Silhouette card ── */
  .silo-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden; position: relative;
  }
  .silo-wrap {
    width: 100%; aspect-ratio: 4/3; background: #1a1a1a;
    display: flex; align-items: center; justify-content: center;
  }
  .silo-wrap video { width: 100%; height: 100%; object-fit: contain; }

  .guesses-left {
    position: absolute; top: 10px; right: 12px;
    background: rgba(0,0,0,0.7); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px; font-size: 12px; color: var(--muted);
    backdrop-filter: blur(4px);
  }
  .guesses-left strong { color: var(--text); }

  /* ── Guess rows ── */
  .guess-list { display: flex; flex-direction: column; gap: 8px; }
  .guess-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px; min-height: 48px;
  }
  .guess-row .guess-num { font-size: 12px; color: var(--muted); min-width: 16px; }
  .guess-row .guess-name { font-size: 14px; font-weight: 500; flex: 1; }
  .guess-row .guess-result { font-size: 18px; }
  .guess-row.correct { border-color: var(--correct); background: rgba(76,175,110,0.1); }
  .guess-row.wrong   { border-color: var(--wrong);   background: rgba(226,92,92,0.08); }
  .guess-row.empty   { border-style: dashed; opacity: 0.4; }

  /* ── Input area ── */
  .input-wrap { position: relative; display: flex; gap: 8px; }
  .input-inner { position: relative; flex: 1; }
  #guess-input {
    width: 100%; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-family: var(--font-body);
    font-size: 16px; outline: none; transition: border-color 0.15s;
  }
  #guess-input:focus { border-color: var(--accent); }
  #guess-input:disabled { opacity: 0.4; }

  .dropdown {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; z-index: 100; display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .dropdown.open { display: block; }
  .dropdown-item {
    padding: 12px 16px; cursor: pointer; font-size: 14px; font-weight: 500;
    border-bottom: 1px solid var(--border); transition: background 0.1s;
    display: flex; align-items: center; justify-content: space-between;
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover, .dropdown-item.highlighted { background: var(--surface2); }
  .dropdown-item .item-meta { font-size: 12px; color: var(--muted); }

  /* ── Result screen ── */
  .result-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px; text-align: center;
    display: none; flex-direction: column; gap: 12px;
  }
  .result-box.show { display: flex; }
  .result-label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .result-name { font-family: var(--font-display); font-size: 28px; font-weight: 900; color: var(--accent); }
  .result-rank { font-size: 13px; color: var(--muted); }

  .btn-share {
    padding: 14px; border: none; border-radius: var(--radius);
    background: var(--accent); color: #1a1a1a; font-family: var(--font-body);
    font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s;
  }
  .btn-share:hover { background: var(--accent-dim); }

  .next-puzzle { text-align: center; font-size: 13px; color: var(--muted); }
  .next-puzzle strong { color: var(--text); }

  .already-played {
    text-align: center; color: var(--muted); font-size: 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; line-height: 1.6;
  }

  .loading-msg { text-align: center; color: var(--muted); padding: 40px 0; font-size: 15px; }
  .error-msg { text-align: center; color: var(--wrong); padding: 20px 0; font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>
<main>
  <div>
    <h1 class="page-title">Guess the <em>Silhouette</em></h1>
    <p class="page-date" id="page-date"></p>
  </div>

  <div id="loading" class="loading-msg">Loading today's player…</div>
  <div id="error" class="error-msg" style="display:none"></div>

  <!-- Silhouette card -->
  <div class="silo-card" id="silo-card" style="display:none">
    <div class="silo-wrap">
      <video id="silo-video" autoplay loop muted playsinline></video>
    </div>
    <div class="guesses-left" id="guesses-left"></div>
  </div>

  <!-- Guess rows -->
  <div class="guess-list" id="guess-list"></div>

  <!-- Input -->
  <div class="input-wrap" id="input-area" style="display:none">
    <div class="input-inner">
      <input type="text" id="guess-input" placeholder="Type a player name…" autocomplete="off" autocorrect="off" spellcheck="false">
      <div class="dropdown" id="dropdown"></div>
    </div>
  </div>

  <!-- Result -->
  <div class="result-box" id="result-box">
    <div class="result-label" id="result-label">The player was</div>
    <div class="result-name" id="result-name"></div>
    <div class="result-rank" id="result-rank"></div>
    <button class="btn-share" id="btn-share">Share result</button>
    <div class="next-puzzle" id="next-puzzle"></div>
  </div>

  <!-- Already played today -->
  <div class="already-played" id="already-played" style="display:none"></div>
</main>

<script>
const MAX_GUESSES = 6;
const STORAGE_KEY = 'silhouette_wordle';

let allPlayers = [];
let dailyOrder = [];
let todayPlayer = null;
let guesses = [];
let gameOver = false;
let highlightedIndex = -1;

// ── Date helpers ──────────────────────────────────────────────────────────────

function getTodayStr() {
  return new Date().toISOString().split('T')[0]; // YYYY-MM-DD
}

function getDayIndex() {
  // Days since a fixed epoch (June 23 2026 = day 0)
  const epoch = new Date('2026-06-23T00:00:00Z');
  const now   = new Date();
  now.setUTCHours(0,0,0,0);
  return Math.floor((now - epoch) / 86400000);
}

function getTimeUntilMidnight() {
  const now = new Date();
  const midnight = new Date();
  midnight.setHours(24, 0, 0, 0);
  const diff = midnight - now;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  return `${h}h ${m}m ${s}s`;
}

// ── Load data ─────────────────────────────────────────────────────────────────

async function init() {
  // Set date display
  document.getElementById('page-date').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

  try {
    const [pr, or] = await Promise.all([
      fetch('data/players.json'),
      fetch('data/daily_order.json')
    ]);
    if (!pr.ok) throw new Error('players.json missing');
    if (!or.ok) throw new Error('daily_order.json missing');

    allPlayers  = await pr.json();
    dailyOrder  = await or.json(); // array of player IDs in fixed order

    const dayIdx    = getDayIndex();
    const todayId   = dailyOrder[dayIdx % dailyOrder.length];
    todayPlayer     = allPlayers.find(p => p.id === todayId);

    if (!todayPlayer) throw new Error('Could not find today\'s player.');

    document.getElementById('loading').style.display = 'none';
    checkSavedState();
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'Could not load today\'s puzzle. ' + e.message;
  }
}

// ── State persistence ─────────────────────────────────────────────────────────

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

function saveState() {
  const state = {
    date:     getTodayStr(),
    playerId: todayPlayer.id,
    guesses,
    gameOver
  };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function checkSavedState() {
  const saved = loadState();
  if (saved && saved.date === getTodayStr() && saved.playerId === todayPlayer.id) {
    guesses  = saved.guesses;
    gameOver = saved.gameOver;
    renderGame();
    if (gameOver) showResult(false);
  } else {
    renderGame();
  }
}

// ── Render ────────────────────────────────────────────────────────────────────

function renderGame() {
  // Show silhouette card
  document.getElementById('silo-card').style.display = '';
  const vid = document.getElementById('silo-video');
  if (!gameOver) {
    vid.src = `silhouettes/${todayPlayer.id}.mp4`;
  } else {
    vid.src = `reveals/${todayPlayer.id}.mp4`;
  }
  vid.load(); vid.play();

  // Guesses remaining
  const remaining = MAX_GUESSES - guesses.length;
  document.getElementById('guesses-left').innerHTML = `<strong>${remaining}</strong> guess${remaining === 1 ? '' : 'es'} left`;

  // Render guess rows
  const list = document.getElementById('guess-list');
  list.innerHTML = '';
  for (let i = 0; i < MAX_GUESSES; i++) {
    const row = document.createElement('div');
    if (i < guesses.length) {
      const g = guesses[i];
      row.className = `guess-row ${g.correct ? 'correct' : 'wrong'}`;
      row.innerHTML = `
        <span class="guess-num">${i + 1}</span>
        <span class="guess-name">${g.name}</span>
        <span class="guess-result">${g.correct ? '✓' : '✗'}</span>`;
    } else {
      row.className = 'guess-row empty';
      row.innerHTML = `<span class="guess-num">${i + 1}</span><span class="guess-name" style="color:var(--border)">—</span>`;
    }
    list.appendChild(row);
  }

  // Show/hide input
  if (!gameOver) {
    document.getElementById('input-area').style.display = 'flex';
  } else {
    document.getElementById('input-area').style.display = 'none';
    document.getElementById('guesses-left').style.display = 'none';
  }
}

// ── Guess logic ───────────────────────────────────────────────────────────────

function norm(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z\s]/g,'').trim();
}

function submitGuess(player) {
  if (gameOver) return;
  const correct = player.id === todayPlayer.id;
  guesses.push({ name: player.name, correct });

  if (correct || guesses.length >= MAX_GUESSES) {
    gameOver = true;
  }

  saveState();
  renderGame();

  if (gameOver) {
    setTimeout(() => showResult(true), 600);
  }

  document.getElementById('guess-input').value = '';
  closeDropdown();
}

// ── Result screen ─────────────────────────────────────────────────────────────

function showResult(animate) {
  const won = guesses.some(g => g.correct);
  const box = document.getElementById('result-box');

  document.getElementById('result-label').textContent = won ? '🎉 Correct!' : 'The player was';
  document.getElementById('result-name').textContent  = todayPlayer.name;
  document.getElementById('result-rank').textContent  = `ATP Rank #${todayPlayer.rank} · ${todayPlayer.country}`;

  // Countdown to next puzzle
  function updateCountdown() {
    document.getElementById('next-puzzle').innerHTML = `Next puzzle in <strong>${getTimeUntilMidnight()}</strong>`;
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);

  box.classList.add('show');

  // Swap video to reveal
  const vid = document.getElementById('silo-video');
  vid.src = `reveals/${todayPlayer.id}.mp4`;
  vid.load(); vid.play();
  document.getElementById('guesses-left').style.display = 'none';
}

// ── Share ─────────────────────────────────────────────────────────────────────

document.getElementById('btn-share').addEventListener('click', () => {
  const won     = guesses.some(g => g.correct);
  const dayIdx  = getDayIndex() + 1;
  const score   = won ? guesses.length : 'X';
  const squares = guesses.map(g => g.correct ? '🟩' : '🟥').join('');
  const text    = `Silhouette #${dayIdx} ${score}/${MAX_GUESSES}\n${squares}\ncourtsideconversation-ctrl.github.io/Game-Hub/`;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('btn-share').textContent = 'Copied!';
    setTimeout(() => document.getElementById('btn-share').textContent = 'Share result', 2000);
  });
});

// ── Autocomplete ──────────────────────────────────────────────────────────────

const inp      = document.getElementById('guess-input');
const dropdown = document.getElementById('dropdown');

function getSuggestions(query) {
  if (!query || query.length < 2) return [];
  const q = norm(query);
  return allPlayers.filter(p => {
    const n     = norm(p.name);
    const parts = n.split(' ');
    return n.startsWith(q) || parts.some(part => part.startsWith(q));
  }).slice(0, 6);
}

function renderDropdown(suggestions) {
  if (suggestions.length === 0) { closeDropdown(); return; }
  dropdown.innerHTML = suggestions.map((p, i) => `
    <div class="dropdown-item" data-index="${i}">
      <span>${p.name}</span>
      <span class="item-meta">${p.country} · #${p.rank}</span>
    </div>`).join('');
  dropdown.classList.add('open');
  highlightedIndex = -1;
  dropdown.querySelectorAll('.dropdown-item').forEach(item => {
    item.addEventListener('mousedown', e => {
      e.preventDefault();
      const idx = parseInt(item.dataset.index);
      submitGuess(suggestions[idx]);
    });
  });
}

function closeDropdown() {
  dropdown.classList.remove('open');
  dropdown.innerHTML = '';
  highlightedIndex = -1;
}

inp.addEventListener('input', () => {
  renderDropdown(getSuggestions(inp.value));
});

inp.addEventListener('keydown', e => {
  const items = dropdown.querySelectorAll('.dropdown-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    highlightedIndex = Math.min(highlightedIndex + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('highlighted', i === highlightedIndex));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    highlightedIndex = Math.max(highlightedIndex - 1, 0);
    items.forEach((el, i) => el.classList.toggle('highlighted', i === highlightedIndex));
  } else if (e.key === 'Enter' && highlightedIndex >= 0) {
    e.preventDefault();
    items[highlightedIndex].dispatchEvent(new Event('mousedown'));
  } else if (e.key === 'Escape') {
    closeDropdown();
  }
});

inp.addEventListener('blur', () => setTimeout(closeDropdown, 150));

// ── Start ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
