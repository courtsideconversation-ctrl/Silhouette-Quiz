<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guess the Player — Silhouette · CourtsideConversation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:         #1e1e1e;
    --surface:    #2a2a2a;
    --surface2:   #333333;
    --accent:     #a8c53a;
    --accent-dim: #6b8e3e;
    --text:       #f0f0f0;
    --muted:      #888;
    --border:     #3a3a3a;
    --correct:    #4caf6e;
    --wrong:      #e25c5c;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body:    'Inter', system-ui, sans-serif;
    --radius:     12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text); font-family: var(--font-body);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  }
  header {
    width: 100%; background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
  }
  main {
    width: 100%; max-width: 560px; padding: 32px 16px 64px;
    display: flex; flex-direction: column; gap: 20px;
  }
  .screen { display: none; flex-direction: column; gap: 20px; }
  .screen.active { display: flex; }

  .game-title { font-family: var(--font-display); font-size: 36px; line-height: 1.1; font-weight: 900; text-align: center; }
  .game-title em { font-style: normal; color: var(--accent); }
  .subtitle { text-align: center; color: var(--muted); font-size: 15px; line-height: 1.6; }

  .mode-label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; text-align: center; }
  .duration-row { display: flex; gap: 8px; justify-content: center; }
  .dur-btn {
    padding: 8px 20px; border: 1px solid var(--border); border-radius: 100px;
    background: var(--surface); color: var(--muted); font-family: var(--font-body);
    font-size: 14px; cursor: pointer; transition: all 0.15s;
  }
  .dur-btn.active { border-color: var(--accent); color: var(--accent); }

  .btn-start {
    padding: 16px; border: none; border-radius: var(--radius); background: var(--accent);
    color: #1a1a1a; font-family: var(--font-body); font-size: 16px; font-weight: 600;
    cursor: pointer; transition: background 0.15s, transform 0.1s;
  }
  .btn-start:hover { background: var(--accent-dim); }
  .btn-start:active { transform: scale(0.98); }
  .btn-start:disabled { opacity: 0.4; cursor: not-allowed; }

  .hud {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 20px;
  }
  .hud-item { text-align: center; }
  .hud-val { font-family: var(--font-display); font-size: 28px; font-weight: 700; line-height: 1; }
  .hud-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 3px; }
  #timer-val { color: var(--accent); }
  #timer-val.danger { color: var(--wrong); }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: -8px; }
  .progress-fill { height: 100%; background: var(--accent); transition: width 1s linear, background 0.5s; }

  .player-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; position: relative; }
  .player-photo-wrap {
    width: 100%; aspect-ratio: 4/3; max-height: 340px; background: #1a1a1a;
    display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;
  }
  .player-photo-wrap img { width: 100%; height: 100%; object-fit: contain; }
  .rank-badge {
    position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.7); border: 1px solid var(--border);
    border-radius: 6px; padding: 4px 10px; font-size: 13px; color: var(--muted); backdrop-filter: blur(4px);
  }
  .rank-badge strong { color: var(--accent); }
  .country-badge {
    position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.7); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 10px; font-size: 13px; font-weight: 600; backdrop-filter: blur(4px);
  }
  .reveal-badge {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.75); border: 1px solid var(--accent); border-radius: 100px;
    padding: 6px 16px; font-size: 12px; color: var(--accent); text-transform: uppercase;
    letter-spacing: 0.06em; opacity: 0; transition: opacity 0.2s; white-space: nowrap;
  }
  .reveal-badge.show { opacity: 1; }

  .answer-overlay {
    position: absolute; bottom: 0; left: 0; right: 0; padding: 14px 18px;
    font-family: var(--font-display); font-size: 22px; font-weight: 700; text-align: center;
    opacity: 0; transform: translateY(6px); transition: opacity 0.2s, transform 0.2s;
  }
  .answer-overlay.show { opacity: 1; transform: translateY(0); }
  .answer-overlay.correct { background: rgba(76,175,110,0.92); color: #fff; }
  .answer-overlay.wrong   { background: rgba(226,92,92,0.92); color: #fff; }
  .answer-overlay.skip    { background: rgba(50,50,50,0.92); color: var(--muted); font-family: var(--font-body); font-size: 15px; }

  /* ── Autocomplete input area ── */
  .input-wrap {
    position: relative;
    display: flex;
    gap: 8px;
  }
  .input-inner {
    position: relative;
    flex: 1;
  }
  #name-input {
    width: 100%; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-family: var(--font-body);
    font-size: 16px; outline: none; transition: border-color 0.15s;
  }
  #name-input:focus  { border-color: var(--accent); }
  #name-input.correct { border-color: var(--correct); }
  #name-input.wrong   { border-color: var(--wrong); }
  #name-input:disabled { opacity: 0.5; }

  .dropdown {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; z-index: 100; display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .dropdown.open { display: block; }
  .dropdown-item {
    padding: 12px 16px; cursor: pointer; font-size: 14px; font-weight: 500;
    border-bottom: 1px solid var(--border); transition: background 0.1s;
    display: flex; align-items: center; justify-content: space-between;
  }
  .dropdown-item:last-child { border-bottom: none; }
  .dropdown-item:hover, .dropdown-item.highlighted { background: var(--surface2); }
  .dropdown-item .item-country { font-size: 12px; color: var(--muted); }
  .dropdown-item .item-rank { font-size: 12px; color: var(--muted); }

  .btn-skip {
    padding: 14px 18px; border: 1px solid var(--border); border-radius: var(--radius);
    background: transparent; color: var(--muted); font-family: var(--font-body);
    font-size: 14px; cursor: pointer; white-space: nowrap; transition: border-color 0.15s, color 0.15s;
    align-self: flex-start;
  }
  .btn-skip:hover { border-color: var(--text); color: var(--text); }
  .btn-skip:disabled { opacity: 0.4; cursor: not-allowed; }

  .results-header { text-align: center; }
  .results-score { font-family: var(--font-display); font-size: 64px; font-weight: 900; color: var(--accent); line-height: 1; }
  .results-label { font-size: 15px; color: var(--muted); margin-top: 6px; }
  .stat-row { display: flex; gap: 10px; }
  .stat-box { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
  .stat-val { font-family: var(--font-display); font-size: 28px; font-weight: 700; color: var(--text); }
  .stat-lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

  .btn-play-again {
    padding: 16px; border: none; border-radius: var(--radius); background: var(--accent);
    color: #1a1a1a; font-family: var(--font-body); font-size: 16px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
  }
  .btn-play-again:hover { background: var(--accent-dim); }

  .loading-msg { text-align: center; color: var(--muted); padding: 40px 0; font-size: 15px; line-height: 1.6; }
  .error-msg { text-align: center; color: var(--wrong); padding: 40px 0; font-size: 15px; line-height: 1.6; }

  @media (max-width: 480px) {
    .game-title { font-size: 28px; }
    .player-photo-wrap { max-height: 260px; }
  }
</style>
</head>
<body>

<main>

  <!-- ── Start screen ── -->
  <div class="screen active" id="screen-start">
    <div>
      <h1 class="game-title">Guess the<br><em>Silhouette</em></h1>
      <p class="subtitle" style="margin-top:10px">Watch the shape move. Name the player before time runs out.</p>
    </div>
    <div>
      <p class="mode-label">Time limit</p>
      <div class="duration-row">
        <button class="dur-btn" data-secs="60">1 min</button>
        <button class="dur-btn active" data-secs="120">2 min</button>
        <button class="dur-btn" data-secs="180">3 min</button>
      </div>
    </div>
    <button class="btn-start" id="btn-start" disabled>Loading…</button>
    <p id="load-status" class="loading-msg">Loading players…</p>
  </div>

  <!-- ── Game screen ── -->
  <div class="screen" id="screen-game">
    <div class="hud">
      <div class="hud-item"><div class="hud-val" id="timer-val">60</div><div class="hud-lbl">Seconds</div></div>
      <div class="hud-item"><div class="hud-val" id="score-val">0</div><div class="hud-lbl">Correct</div></div>
      <div class="hud-item"><div class="hud-val" id="asked-val">0</div><div class="hud-lbl">Asked</div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

    <div class="player-card">
      <div class="player-photo-wrap">
        <video id="player-photo" autoplay loop muted playsinline style="width:100%;height:100%;object-fit:contain;"></video>
        <div class="rank-badge">Rank <strong id="player-rank">#1</strong></div>
        <div class="country-badge" id="player-country">ESP</div>
        <div class="reveal-badge" id="reveal-badge">Revealed</div>
      </div>
      <div class="answer-overlay" id="answer-overlay"></div>
    </div>

    <div class="input-wrap">
      <div class="input-inner">
        <input type="text" id="name-input" placeholder="Start typing a player name…" autocomplete="off" autocorrect="off" spellcheck="false">
        <div class="dropdown" id="dropdown"></div>
      </div>
      <button class="btn-skip" id="btn-skip">Skip</button>
    </div>
  </div>

  <!-- ── Results screen ── -->
  <div class="screen" id="screen-results">
    <div class="results-header">
      <div class="results-score" id="final-score">0</div>
      <div class="results-label">players identified</div>
    </div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-val" id="stat-asked">0</div><div class="stat-lbl">Shown</div></div>
      <div class="stat-box"><div class="stat-val" id="stat-acc">—</div><div class="stat-lbl">Accuracy</div></div>
      <div class="stat-box"><div class="stat-val" id="stat-streak">0</div><div class="stat-lbl">Best streak</div></div>
    </div>
    <button class="btn-play-again" id="btn-play-again">Play again</button>
  </div>

</main>

<script>
let allPlayers = [];   // all 100 from players.json (used for autocomplete suggestions)
let pool       = [];   // players that have both silhouette + reveal
let queue = [], current = null;
let totalSecs = 120, timer = null, secsLeft = 0;
let score = 0, asked = 0, streak = 0, bestStreak = 0;
let lockInput = false;
let highlightedIndex = -1;

// ── Load data ─────────────────────────────────────────────────────────────────

async function loadData() {
  try {
    const [pr, ir] = await Promise.all([fetch('data/players.json'), fetch('data/silhouettes.json')]);
    if (!pr.ok) throw new Error('players.json missing');
    allPlayers = await pr.json();
    const ids = ir.ok ? await ir.json() : [];
    const idSet = new Set(ids);
    pool = allPlayers.filter(p => idSet.has(p.id));

    const statusEl = document.getElementById('load-status');
    const btn = document.getElementById('btn-start');
    if (pool.length === 0) {
      statusEl.textContent = 'No silhouette clips added yet — check back soon!';
      btn.disabled = true;
      btn.textContent = 'No players yet';
    } else {
      statusEl.style.display = 'none';
      btn.disabled = false;
      btn.textContent = `Start game`;
    }
  } catch (e) {
    document.getElementById('load-status').className = 'error-msg';
    document.getElementById('load-status').textContent = 'Could not load player data.';
  }
}
loadData();

// ── Helpers ───────────────────────────────────────────────────────────────────

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function norm(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z\s]/g,'').trim();
}

// ── Toggles ───────────────────────────────────────────────────────────────────

document.querySelectorAll('.dur-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    totalSecs = parseInt(btn.dataset.secs);
  });
});

// ── Game flow ─────────────────────────────────────────────────────────────────

document.getElementById('btn-start').addEventListener('click', startGame);
document.getElementById('btn-play-again').addEventListener('click', () => showScreen('screen-start'));

function startGame() {
  score = 0; asked = 0; streak = 0; bestStreak = 0;
  queue = shuffle(pool);
  secsLeft = totalSecs;
  updateHUD();
  showScreen('screen-game');
  nextPlayer();
  startTimer();
  document.getElementById('name-input').focus();
}

function startTimer() {
  clearInterval(timer);
  const fill = document.getElementById('progress-fill');
  fill.style.width = '100%';
  fill.style.background = 'var(--accent)';
  timer = setInterval(() => {
    secsLeft--;
    const pct = (secsLeft / totalSecs) * 100;
    document.getElementById('timer-val').textContent = secsLeft;
    document.getElementById('timer-val').className = secsLeft <= 10 ? 'hud-val danger' : 'hud-val';
    fill.style.width = pct + '%';
    if (secsLeft <= 10) fill.style.background = 'var(--wrong)';
    if (secsLeft <= 0) endGame();
  }, 1000);
}

function nextPlayer() {
  if (queue.length === 0) { queue = shuffle(pool); } // loop if small roster
  current = queue.pop();
  asked++;
  lockInput = false;
  highlightedIndex = -1;

  const vid = document.getElementById('player-photo');
  vid.src = `silhouettes/${current.id}.mp4`;
  vid.load(); vid.play();
  document.getElementById('player-rank').textContent    = '#' + current.rank;
  document.getElementById('player-country').textContent = current.country || '';
  document.getElementById('reveal-badge').classList.remove('show');

  const ov = document.getElementById('answer-overlay');
  ov.className = 'answer-overlay'; ov.textContent = '';

  const inp = document.getElementById('name-input');
  inp.value = ''; inp.className = ''; inp.disabled = false;
  document.getElementById('btn-skip').disabled = false;
  closeDropdown();
  updateHUD();
}

function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('asked-val').textContent = asked;
  document.getElementById('timer-val').textContent = secsLeft;
}

// ── Autocomplete ──────────────────────────────────────────────────────────────

const inp = document.getElementById('name-input');
const dropdown = document.getElementById('dropdown');

function getSuggestions(query) {
  if (!query || query.length < 2) return [];
  const q = norm(query);
  return allPlayers.filter(p => {
    const n = norm(p.name);
    const parts = n.split(' ');
    return n.startsWith(q) || parts.some(part => part.startsWith(q));
  }).slice(0, 6);
}

function renderDropdown(suggestions) {
  if (suggestions.length === 0) { closeDropdown(); return; }
  dropdown.innerHTML = suggestions.map((p, i) => `
    <div class="dropdown-item" data-index="${i}" data-id="${p.id}">
      <span>${p.name}</span>
      <span class="item-country">${p.country || ''} &nbsp;<span class="item-rank">#${p.rank}</span></span>
    </div>`).join('');
  dropdown.classList.add('open');
  highlightedIndex = -1;

  dropdown.querySelectorAll('.dropdown-item').forEach(item => {
    item.addEventListener('mousedown', e => {
      e.preventDefault();
      const idx = parseInt(item.dataset.index);
      selectSuggestion(suggestions[idx]);
    });
  });
}

function closeDropdown() {
  dropdown.classList.remove('open');
  dropdown.innerHTML = '';
  highlightedIndex = -1;
}

function selectSuggestion(player) {
  inp.value = player.name;
  closeDropdown();
  if (player.id === current.id) {
    inp.className = 'correct';
    markCorrect();
  } else {
    inp.className = 'wrong';
    markWrong(player.name);
  }
}

inp.addEventListener('input', () => {
  if (lockInput) return;
  const suggestions = getSuggestions(inp.value);
  renderDropdown(suggestions);
});

inp.addEventListener('keydown', e => {
  if (lockInput) return;
  const items = dropdown.querySelectorAll('.dropdown-item');

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    highlightedIndex = Math.min(highlightedIndex + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('highlighted', i === highlightedIndex));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    highlightedIndex = Math.max(highlightedIndex - 1, 0);
    items.forEach((el, i) => el.classList.toggle('highlighted', i === highlightedIndex));
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (highlightedIndex >= 0 && items[highlightedIndex]) {
      items[highlightedIndex].dispatchEvent(new Event('mousedown'));
    }
  } else if (e.key === 'Escape') {
    closeDropdown();
    markSkip();
  }
});

inp.addEventListener('blur', () => {
  setTimeout(closeDropdown, 150);
});

// ── Answer handling ───────────────────────────────────────────────────────────

function flashOverlay(type, text) {
  const ov = document.getElementById('answer-overlay');
  ov.textContent = text; ov.className = `answer-overlay ${type} show`;
}

function revealAndAdvance() {
  const vid = document.getElementById('player-photo');
  vid.src = `reveals/${current.id}.mp4`;
  vid.load(); vid.play();
  document.getElementById('reveal-badge').classList.add('show');
  setTimeout(() => {
    nextPlayer();
    document.getElementById('name-input').focus();
  }, 1800);
}

function markCorrect() {
  if (lockInput) return; lockInput = true;
  score++; streak++;
  if (streak > bestStreak) bestStreak = streak;
  flashOverlay('correct', '✓ ' + current.name);
  inp.disabled = true;
  document.getElementById('btn-skip').disabled = true;
  updateHUD();
  revealAndAdvance();
}

function markWrong(guessedName) {
  if (lockInput) return; lockInput = true;
  streak = 0;
  flashOverlay('wrong', '✗ ' + current.name);
  inp.disabled = true;
  document.getElementById('btn-skip').disabled = true;
  updateHUD();
  revealAndAdvance();
}

function markSkip() {
  if (lockInput) return; lockInput = true;
  streak = 0;
  flashOverlay('skip', current.name);
  inp.disabled = true;
  document.getElementById('btn-skip').disabled = true;
  revealAndAdvance();
}

document.getElementById('btn-skip').addEventListener('click', markSkip);

// ── End game ──────────────────────────────────────────────────────────────────

function endGame() {
  clearInterval(timer);
  closeDropdown();
  document.getElementById('final-score').textContent = score;
  document.getElementById('stat-asked').textContent  = asked;
  document.getElementById('stat-acc').textContent    = asked > 0 ? Math.round((score / asked) * 100) + '%' : '—';
  document.getElementById('stat-streak').textContent = bestStreak;
  showScreen('screen-results');
}
</script>
</body>
</html>
