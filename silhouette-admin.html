<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silhouette Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1e1e1e; --surface: #2a2a2a; --surface2: #333;
    --accent: #a8c53a; --accent-dim: #6b8e3e;
    --text: #f0f0f0; --muted: #888; --border: #3a3a3a;
    --correct: #4caf6e; --wrong: #e25c5c;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'Inter', system-ui, sans-serif;
    --radius: 12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }

  /* ── Gate ── */
  #gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .gate-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 40px 32px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 16px; text-align: center;
  }
  .gate-title { font-family: var(--font-display); font-size: 24px; font-weight: 900; }
  .gate-title em { font-style: normal; color: var(--accent); }
  .gate-input {
    padding: 12px 16px; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: var(--font-body); font-size: 15px; outline: none; text-align: center;
  }
  .gate-input:focus { border-color: var(--accent); }
  .gate-error { font-size: 13px; color: var(--wrong); display: none; }

  /* ── App ── */
  #app { display: none; max-width: 800px; margin: 0 auto; padding: 32px 16px 64px; }
  .app-header { margin-bottom: 20px; }
  .app-title { font-family: var(--font-display); font-size: 28px; font-weight: 900; }
  .app-title em { font-style: normal; color: var(--accent); }

  /* ── Page tabs ── */
  .page-tabs {
    display: flex; background: var(--surface); border: 1px solid var(--border);
    border-radius: 100px; padding: 4px; gap: 4px; margin-bottom: 20px;
  }
  .page-tab {
    flex: 1; padding: 10px 16px; border: none; border-radius: 100px;
    background: transparent; color: var(--muted); font-family: var(--font-body);
    font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s, color 0.15s;
  }
  .page-tab.active { background: var(--accent); color: #1a1a1a; }

  .search-bar {
    width: 100%; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-family: var(--font-body);
    font-size: 15px; outline: none; margin-bottom: 16px;
  }
  .search-bar:focus { border-color: var(--accent); }

  /* ── Player list ── */
  .player-list { display: flex; flex-direction: column; gap: 8px; }
  .player-row {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 16px; cursor: pointer; transition: border-color 0.15s;
  }
  .player-row:hover { border-color: var(--accent); }
  .player-rank { font-size: 12px; color: var(--muted); min-width: 36px; }
  .player-name { font-size: 15px; font-weight: 600; flex: 1; }
  .player-country { font-size: 12px; color: var(--muted); }
  .clip-count {
    font-size: 12px; padding: 3px 10px; border-radius: 100px; font-weight: 600;
    background: rgba(168,197,58,0.15); color: var(--accent); border: 1px solid var(--accent);
  }
  .clip-count.zero { background: rgba(136,136,136,0.1); color: var(--muted); border-color: var(--border); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.75);
    display: none; align-items: flex-start; justify-content: center;
    z-index: 200; padding: 24px; backdrop-filter: blur(4px); overflow-y: auto;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px 24px;
    width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 20px;
    position: relative; margin: auto; animation: popIn 0.2s ease;
  }
  @keyframes popIn { from { transform: scale(0.93); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal-close {
    position: absolute; top: 14px; right: 14px; background: transparent;
    border: 1px solid var(--border); border-radius: 6px; width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted); cursor: pointer; font-size: 16px;
  }
  .modal-close:hover { border-color: var(--text); color: var(--text); }
  .modal-player { font-family: var(--font-display); font-size: 22px; font-weight: 900; }
  .modal-player span { color: var(--accent); }
  .modal-sub { font-size: 12px; color: var(--muted); }

  /* ── Existing clips grid ── */
  .clips-section h3 { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; }
  .clips-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .clip-pair {
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; display: flex; flex-direction: column;
  }
  .clip-videos { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; background: var(--border); }
  .clip-video-wrap { background: #111; aspect-ratio: 4/3; overflow: hidden; }
  .clip-video-wrap video { width: 100%; height: 100%; object-fit: contain; }
  .clip-video-label { font-size: 9px; color: var(--muted); text-align: center; padding: 2px; background: var(--surface2); }
  .clip-footer {
    padding: 8px 10px; display: flex; align-items: center; justify-content: space-between;
    gap: 8px;
  }
  .clip-info { font-size: 12px; color: var(--muted); }
  .clip-info strong { color: var(--text); font-size: 13px; }
  .btn-delete-clip {
    padding: 4px 10px; border: 1px solid var(--wrong); border-radius: 6px;
    background: transparent; color: var(--wrong); font-family: var(--font-body);
    font-size: 11px; cursor: pointer; transition: background 0.15s;
  }
  .btn-delete-clip:hover { background: rgba(226,92,92,0.15); }
  .no-clips { font-size: 14px; color: var(--muted); text-align: center; padding: 20px 0; }

  /* ── Upload new clip ── */
  .upload-section { display: flex; flex-direction: column; gap: 10px; }
  .upload-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .upload-sub { font-size: 12px; color: var(--muted); }
  .upload-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .view-btns { display: flex; gap: 8px; }
  .view-btn {
    padding: 6px 14px; border: 1px solid var(--border); border-radius: 100px;
    background: transparent; color: var(--muted); font-family: var(--font-body);
    font-size: 13px; cursor: pointer; transition: all 0.15s;
  }
  .view-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(168,197,58,0.1); }

  .drop-zone {
    border: 2px dashed var(--border); border-radius: 8px; padding: 16px;
    text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s;
    position: relative; min-height: 80px; display: flex; align-items: center; justify-content: center;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: rgba(168,197,58,0.05); }
  .drop-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .drop-zone-text { font-size: 12px; color: var(--muted); pointer-events: none; line-height: 1.5; }
  .drop-zone-text strong { color: var(--accent); display: block; }
  .drop-zone.has-file { border-color: var(--correct); background: rgba(76,175,110,0.05); }
  .drop-zone.has-file .drop-zone-text { color: var(--correct); }

  .btn-upload {
    padding: 13px; border: none; border-radius: var(--radius);
    background: var(--accent); color: #1a1a1a; font-family: var(--font-body);
    font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s;
  }
  .btn-upload:hover { background: var(--accent-dim); }
  .btn-upload:disabled { opacity: 0.4; cursor: not-allowed; }

  .upload-progress { font-size: 13px; color: var(--muted); text-align: center; display: none; line-height: 1.7; }
  .upload-progress.show { display: block; }
  .upload-success { color: var(--correct); }
  .upload-error { color: var(--wrong); }

  .btn-gate { padding: 10px 16px; border: none; border-radius: 8px; background: var(--accent); color: #1a1a1a; font-family: var(--font-body); font-size: 14px; font-weight: 600; cursor: pointer; }
  .loading { text-align: center; color: var(--muted); padding: 40px; font-size: 15px; }
</style>
</head>
<body>

<!-- Gate -->
<div id="gate">
  <div class="gate-box">
    <div class="gate-title">Silhouette <em>Admin</em></div>
    <p style="font-size:13px;color:var(--muted)">Enter password and GitHub token.</p>
    <input type="password" class="gate-input" id="gate-input" placeholder="Admin password" onkeydown="if(event.key==='Enter')checkPassword()">
    <input type="password" class="gate-input" id="gate-token" placeholder="GitHub token (ghp_...)" onkeydown="if(event.key==='Enter')checkPassword()">
    <button class="btn-gate" onclick="checkPassword()">Enter</button>
    <p class="gate-error" id="gate-error"></p>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="app-header">
    <h1 class="app-title">Silhouette <em>Admin</em></h1>
  </div>

  <div class="page-tabs">
    <button class="page-tab active" id="tab-shots" onclick="switchPageTab('shot')">Shots</button>
    <button class="page-tab" id="tab-celeb" onclick="switchPageTab('celebration')">Celebrations</button>
  </div>

  <input type="text" class="search-bar" id="search-bar" placeholder="Search players…" oninput="filterPlayers()">
  <div class="player-list" id="player-list"><div class="loading">Loading…</div></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div>
      <div class="modal-player" id="modal-name"></div>
      <div class="modal-sub" id="modal-sub"></div>
    </div>

    <!-- Existing clips -->
    <div class="clips-section">
      <h3 id="clips-section-title">Existing clips</h3>
      <div class="clips-grid" id="clips-grid"></div>
    </div>

    <!-- Upload new clip -->
    <div class="upload-section">
      <div class="upload-title">Upload new clip</div>
      <div class="upload-sub" id="upload-sub"></div>

      <!-- Front/back toggle — shot only -->
      <div id="view-toggle-wrap">
        <div class="view-btns">
          <button class="view-btn" id="vbtn-front" onclick="setView('front')">Front view</button>
          <button class="view-btn" id="vbtn-back" onclick="setView('back')">Back view</button>
        </div>
      </div>

      <div class="upload-row">
        <div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px;" id="silo-label">Silhouette MP4</div>
          <div class="drop-zone" id="silo-drop">
            <input type="file" accept="video/mp4,video/*" onchange="handleFile('silo',this.files[0])">
            <div class="drop-zone-text"><strong>Drop or click</strong>silhouette MP4</div>
          </div>
        </div>
        <div>
          <div style="font-size:12px;color:var(--muted);margin-bottom:6px;" id="reveal-label">Reveal MP4</div>
          <div class="drop-zone" id="reveal-drop">
            <input type="file" accept="video/mp4,video/*" onchange="handleFile('reveal',this.files[0])">
            <div class="drop-zone-text"><strong>Drop or click</strong>reveal MP4</div>
          </div>
        </div>
      </div>

      <div class="upload-progress" id="upload-progress"></div>
      <button class="btn-upload" id="btn-upload" onclick="uploadClip()" disabled>Upload clip</button>
    </div>
  </div>
</div>

<script>
const ADMIN_PASSWORD = 'courtside2026';
let GITHUB_TOKEN = '';
const REPO_OWNER = 'courtsideconversation-ctrl';
const REPO_NAME  = 'Silhouette-Quiz';
const BRANCH     = 'main';

let allPlayers    = [];
let currentTab    = 'shot'; // 'shot' | 'celebration'
let selectedPlayer = null;
let selectedView  = null;
let pendingSilo   = null;
let pendingReveal = null;

// Track existing clips per player per mode: { id: [1,2,...] }
let shotClips   = {}; // id -> array of clip numbers that have BOTH silo+reveal
let celebClips  = {};

// ── Gate ──────────────────────────────────────────────────────────────────────
function checkPassword() {
  const pw    = document.getElementById('gate-input').value;
  const token = document.getElementById('gate-token').value.trim();
  if (pw !== ADMIN_PASSWORD) {
    document.getElementById('gate-error').style.display = 'block';
    document.getElementById('gate-error').textContent = 'Incorrect password.';
    return;
  }
  if (!token.startsWith('ghp_')) {
    document.getElementById('gate-error').style.display = 'block';
    document.getElementById('gate-error').textContent = 'Enter a valid GitHub token (starts with ghp_).';
    return;
  }
  GITHUB_TOKEN = token;
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display  = 'block';
  loadData();
}

// ── GitHub API ─────────────────────────────────────────────────────────────────
function ghHeaders() {
  return { Authorization: `token ${GITHUB_TOKEN}`, Accept: 'application/vnd.github.v3+json' };
}
async function ghGet(path) {
  return fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/${path}`, { headers: ghHeaders() });
}
async function ghGetSha(path) {
  const r = await ghGet(`contents/${path}`);
  if (!r.ok) return null;
  return (await r.json()).sha;
}
async function ghPut(path, content, message, sha) {
  const body = { message, content, branch: BRANCH };
  if (sha) body.sha = sha;
  const r = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
    method: 'PUT',
    headers: { ...ghHeaders(), 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(`GitHub API error ${r.status}: ${await r.text()}`);
  return r.json();
}
async function ghDelete(path, sha, message) {
  const r = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
    method: 'DELETE',
    headers: { ...ghHeaders(), 'Content-Type': 'application/json' },
    body: JSON.stringify({ message, sha, branch: BRANCH })
  });
  if (!r.ok) throw new Error(`Delete failed: ${r.status}`);
}
function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

// ── Load data ─────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const pr = await fetch('data/players.json');
    allPlayers = await pr.json();

    // Fetch all 4 folders
    const [sr, cr, rsr, rcr] = await Promise.all([
      ghGet('contents/silhouettes'),
      ghGet('contents/celebrations'),
      ghGet('contents/reveals-shot'),
      ghGet('contents/reveals-celeb'),
    ]);

    const siloSet   = new Set();
    const celebSet  = new Set();
    const rShotSet  = new Set();
    const rCelebSet = new Set();

    if (sr.ok)  (await sr.json()).forEach(f  => { if (f.name.endsWith('.mp4')) siloSet.add(f.name.replace('.mp4',''));  });
    if (cr.ok)  (await cr.json()).forEach(f  => { if (f.name.endsWith('.mp4')) celebSet.add(f.name.replace('.mp4',''));  });
    if (rsr.ok) (await rsr.json()).forEach(f => { if (f.name.endsWith('.mp4')) rShotSet.add(f.name.replace('.mp4','')); });
    if (rcr.ok) (await rcr.json()).forEach(f => { if (f.name.endsWith('.mp4')) rCelebSet.add(f.name.replace('.mp4','')); });

    // Build clip maps: only count clips where BOTH silo and reveal exist
    shotClips  = {};
    celebClips = {};
    siloSet.forEach(key => {
      // key = "5992_1"
      if (rShotSet.has(key)) {
        const [id, clip] = key.split('_');
        if (!shotClips[id]) shotClips[id] = [];
        shotClips[id].push(parseInt(clip));
      }
    });
    celebSet.forEach(key => {
      if (rCelebSet.has(key)) {
        const [id, clip] = key.split('_');
        if (!celebClips[id]) celebClips[id] = [];
        celebClips[id].push(parseInt(clip));
      }
    });

    renderList(allPlayers);
  } catch(e) {
    document.getElementById('player-list').innerHTML = `<div class="loading" style="color:var(--wrong)">Error: ${e.message}</div>`;
  }
}

// ── Tab switching ─────────────────────────────────────────────────────────────
function switchPageTab(tab) {
  currentTab = tab;
  document.getElementById('tab-shots').classList.toggle('active', tab === 'shot');
  document.getElementById('tab-celeb').classList.toggle('active', tab === 'celebration');
  filterPlayers();
}

// ── Player list ───────────────────────────────────────────────────────────────
function renderList(players) {
  const list = document.getElementById('player-list');
  if (!players.length) { list.innerHTML = '<div class="loading">No players found.</div>'; return; }
  const clips = currentTab === 'shot' ? shotClips : celebClips;
  list.innerHTML = players.map(p => {
    const count = (clips[String(p.id)] || []).length;
    return `
      <div class="player-row" onclick="openModal(${p.id})">
        <span class="player-rank">#${p.rank}</span>
        <span class="player-name">${p.name}</span>
        <span class="player-country">${p.country || ''}</span>
        <span class="clip-count ${count === 0 ? 'zero' : ''}">${count} clip${count !== 1 ? 's' : ''}</span>
      </div>`;
  }).join('');
}

function filterPlayers() {
  const q = document.getElementById('search-bar').value.toLowerCase();
  renderList(allPlayers.filter(p => p.name.toLowerCase().includes(q)));
}

// ── Modal ─────────────────────────────────────────────────────────────────────
async function openModal(id) {
  selectedPlayer = allPlayers.find(p => p.id === id);
  pendingSilo    = null;
  pendingReveal  = null;
  selectedView   = null;

  document.getElementById('modal-name').textContent = selectedPlayer.name;
  document.getElementById('modal-sub').textContent  = `ID: ${id} · Rank #${selectedPlayer.rank} · ${selectedPlayer.country}`;

  // Show/hide view toggle based on tab
  document.getElementById('view-toggle-wrap').style.display = currentTab === 'shot' ? 'block' : 'none';
  document.getElementById('vbtn-front').classList.remove('active');
  document.getElementById('vbtn-back').classList.remove('active');

  // Labels
  document.getElementById('clips-section-title').textContent = currentTab === 'shot' ? 'Existing shot clips' : 'Existing celebration clips';
  document.getElementById('upload-sub').textContent = currentTab === 'shot'
    ? 'Upload a shot silhouette and its reveal clip together.'
    : 'Upload a celebration silhouette and its reveal clip together.';
  document.getElementById('silo-label').textContent  = currentTab === 'shot' ? 'Shot silhouette MP4' : 'Celebration silhouette MP4';
  document.getElementById('reveal-label').textContent = currentTab === 'shot' ? 'Shot reveal MP4' : 'Celebration reveal MP4';

  // Reset drop zones
  ['silo', 'reveal'].forEach(type => {
    const dz = document.getElementById(`${type}-drop`);
    dz.classList.remove('has-file');
    dz.querySelector('.drop-zone-text').innerHTML = `<strong>Drop or click</strong>${type === 'silo' ? 'silhouette' : 'reveal'} MP4`;
    dz.querySelector('input').value = '';
  });
  document.getElementById('upload-progress').classList.remove('show');
  document.getElementById('upload-progress').innerHTML = '';
  document.getElementById('btn-upload').disabled = true;

  // Load existing clips
  await renderClips(id);

  document.getElementById('modal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

async function renderClips(id) {
  const grid  = document.getElementById('clips-grid');
  const clips = currentTab === 'shot' ? shotClips : celebClips;
  const nums  = (clips[String(id)] || []).sort((a,b) => a-b);

  if (nums.length === 0) {
    grid.innerHTML = `<div class="no-clips">No clips yet — upload below.</div>`;
    return;
  }

  const siloFolder   = currentTab === 'shot' ? 'silhouettes' : 'celebrations';
  const revealFolder = currentTab === 'shot' ? 'reveals-shot' : 'reveals-celeb';
  const baseUrl      = `https://courtsideconversation-ctrl.github.io/Silhouette-Quiz`;

  grid.innerHTML = nums.map(n => `
    <div class="clip-pair" id="clip-${id}-${n}">
      <div class="clip-videos">
        <div>
          <div class="clip-video-label">Silhouette</div>
          <div class="clip-video-wrap">
            <video src="${baseUrl}/${siloFolder}/${id}_${n}.mp4" autoplay loop muted playsinline></video>
          </div>
        </div>
        <div>
          <div class="clip-video-label">Reveal</div>
          <div class="clip-video-wrap">
            <video src="${baseUrl}/${revealFolder}/${id}_${n}.mp4" autoplay loop muted playsinline></video>
          </div>
        </div>
      </div>
      <div class="clip-footer">
        <div class="clip-info"><strong>Clip ${n}</strong></div>
        <button class="btn-delete-clip" onclick="deleteClip(${id}, ${n})">Delete</button>
      </div>
    </div>`).join('');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.body.style.overflow = '';
}

// ── View toggle ───────────────────────────────────────────────────────────────
function setView(v) {
  selectedView = v;
  document.getElementById('vbtn-front').classList.toggle('active', v === 'front');
  document.getElementById('vbtn-back').classList.toggle('active',  v === 'back');
  const viewOk = currentTab !== 'shot' || selectedView !== null;
  document.getElementById('btn-upload').disabled = !(pendingSilo && pendingReveal && viewOk);
}

// ── File handling ─────────────────────────────────────────────────────────────
function handleFile(type, file) {
  if (!file) return;
  if (type === 'silo')   pendingSilo   = file;
  if (type === 'reveal') pendingReveal = file;
  const dz = document.getElementById(`${type}-drop`);
  dz.classList.add('has-file');
  dz.querySelector('.drop-zone-text').innerHTML = `<strong>✓ ${file.name}</strong>`;
  const viewOk = currentTab !== 'shot' || selectedView !== null;
  document.getElementById('btn-upload').disabled = !(pendingSilo && pendingReveal && viewOk);
}

['silo', 'reveal'].forEach(type => {
  const dz = document.getElementById(`${type}-drop`);
  dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(type, file);
  });
});

// ── Upload ────────────────────────────────────────────────────────────────────
async function uploadClip() {
  if (!pendingSilo || !pendingReveal || !selectedPlayer) return;
  const btn      = document.getElementById('btn-upload');
  const progress = document.getElementById('upload-progress');
  btn.disabled   = true;
  progress.classList.add('show');

  try {
    const id       = selectedPlayer.id;
    const clips    = currentTab === 'shot' ? shotClips : celebClips;
    const existing = (clips[String(id)] || []);
    const nextClip = existing.length > 0 ? Math.max(...existing) + 1 : 1;
    const key      = `${id}_${nextClip}`;

    const siloFolder   = currentTab === 'shot' ? 'silhouettes' : 'celebrations';
    const revealFolder = currentTab === 'shot' ? 'reveals-shot' : 'reveals-celeb';
    const orderFile    = currentTab === 'shot' ? 'data/shot_order.json' : 'data/celebration_order.json';

    progress.innerHTML = `Uploading silhouette (clip ${nextClip})…`;
    const siloB64 = await fileToBase64(pendingSilo);
    const siloSha = await ghGetSha(`${siloFolder}/${key}.mp4`);
    await ghPut(`${siloFolder}/${key}.mp4`, siloB64, `Add ${currentTab} silhouette for ${selectedPlayer.name} clip ${nextClip}`, siloSha);

    progress.innerHTML = `Uploading reveal (clip ${nextClip})…`;
    const revB64 = await fileToBase64(pendingReveal);
    const revSha = await ghGetSha(`${revealFolder}/${key}.mp4`);
    await ghPut(`${revealFolder}/${key}.mp4`, revB64, `Add ${currentTab} reveal for ${selectedPlayer.name} clip ${nextClip}`, revSha);

    // Update order JSON — read from GitHub API to avoid cache issues
    progress.innerHTML = 'Updating order file…';
    const orderRes = await ghGet(`contents/${orderFile}`);
    let order = [];
    if (orderRes.ok) {
      const orderData = await orderRes.json();
      order = JSON.parse(atob(orderData.content.replace(/\n/g, '')));
    }
    const entry = currentTab === 'shot'
      ? { id: Number(id), clip: nextClip, view: selectedView }
      : { id: Number(id), clip: nextClip };
    order.push(entry);
    const orderB64 = btoa(unescape(encodeURIComponent(JSON.stringify(order, null, 2))));
    const orderSha = await ghGetSha(orderFile);
    await ghPut(orderFile, orderB64, `Add ${selectedPlayer.name} clip ${nextClip} to ${currentTab} order`, orderSha);

    // Update local state
    if (!clips[String(id)]) clips[String(id)] = [];
    clips[String(id)].push(nextClip);

    progress.innerHTML = `<span class="upload-success">✓ Clip ${nextClip} uploaded!</span>`;
    btn.disabled  = false;
    pendingSilo   = null;
    pendingReveal = null;

    // Reset drop zones
    ['silo', 'reveal'].forEach(type => {
      const dz = document.getElementById(`${type}-drop`);
      dz.classList.remove('has-file');
      dz.querySelector('.drop-zone-text').innerHTML = `<strong>Drop or click</strong>${type === 'silo' ? 'silhouette' : 'reveal'} MP4`;
      dz.querySelector('input').value = '';
    });

    await renderClips(id);
    filterPlayers();

  } catch(e) {
    progress.innerHTML = `<span class="upload-error">✗ Error: ${e.message}</span>`;
    btn.disabled = false;
  }
}

// ── Delete clip ───────────────────────────────────────────────────────────────
async function deleteClip(id, clipNum) {
  if (!confirm(`Delete clip ${clipNum} for ${selectedPlayer.name}? This will also remove it from the daily order.`)) return;

  const siloFolder   = currentTab === 'shot' ? 'silhouettes' : 'celebrations';
  const revealFolder = currentTab === 'shot' ? 'reveals-shot' : 'reveals-celeb';
  const orderFile    = currentTab === 'shot' ? 'data/shot_order.json' : 'data/celebration_order.json';
  const key          = `${id}_${clipNum}`;
  const progress     = document.getElementById('upload-progress');
  progress.classList.add('show');
  progress.innerHTML = `Deleting clip ${clipNum}…`;

  try {
    // Delete silhouette
    const siloSha = await ghGetSha(`${siloFolder}/${key}.mp4`);
    if (siloSha) await ghDelete(`${siloFolder}/${key}.mp4`, siloSha, `Delete ${currentTab} silhouette ${key}`);

    // Delete reveal
    const revSha = await ghGetSha(`${revealFolder}/${key}.mp4`);
    if (revSha) await ghDelete(`${revealFolder}/${key}.mp4`, revSha, `Delete ${currentTab} reveal ${key}`);

    // Remove from order file — read from GitHub API to avoid cache
    const orderRes = await ghGet(`contents/${orderFile}`);
    if (orderRes.ok) {
      const orderData = await orderRes.json();
      let order = JSON.parse(atob(orderData.content.replace(/\n/g, '')));
      order = order.filter(e => !(Number(e.id) === Number(id) && e.clip === clipNum));
      const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(order, null, 2))));
      const sha = await ghGetSha(orderFile);
      await ghPut(orderFile, b64, `Remove ${selectedPlayer.name} clip ${clipNum} from ${currentTab} order`, sha);
    }

    // Update local state
    const clips = currentTab === 'shot' ? shotClips : celebClips;
    if (clips[String(id)]) {
      clips[String(id)] = clips[String(id)].filter(n => n !== clipNum);
    }

    progress.innerHTML = `<span class="upload-success">✓ Clip ${clipNum} deleted.</span>`;
    await renderClips(id);
    filterPlayers();

  } catch(e) {
    progress.innerHTML = `<span class="upload-error">✗ Error: ${e.message}</span>`;
  }
}
</script>
